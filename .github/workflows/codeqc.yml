name: "QC 🛠️"

on: [push]

jobs:
  lint:
    name: "Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.10

    - name: Install dependencies
      run: uv sync --group dev

    - name: Code QC
      run: uv run ./dev/codeqc.sh check

  test:
    name: "Tests"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.10

    - name: Install dependencies
      run: uv sync --group dev

    - name: Doctests
      run: uv run ./dev/run-doctests.sh

    - name: Unit tests
      run: uv run pytest

  docs:
    name: "Docs Build"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.10

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y pandoc

    - name: Install dependencies
      run: uv sync --group dev --group docs

    - name: Build docs
      run: |
        uv run ./dev/build-docs.sh
        tar czvf docs.tar.gz -C docs/_build/html .

    - name: Upload Docs Tarball
      uses: actions/upload-artifact@v4
      with:
        name: docs.tar.gz
        path: docs.tar.gz
        retention-days: 5
