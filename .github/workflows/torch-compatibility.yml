name: "PyTorch Compatibility 🔥"

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
        torch-version: ["2.10.0", "2.11.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install with specific PyTorch ${{ matrix.torch-version }}
        run: |
          echo 'torch==${{ matrix.torch-version }}' > /tmp/torch-override.txt
          UV_OVERRIDE=/tmp/torch-override.txt uv sync --group dev

      - name: Run tests
        run: uv run pytest --no-cov -x -q
