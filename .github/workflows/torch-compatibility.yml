name: "PyTorch Compatibility 🔥"

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        torch-version: ["2.10.0", "2.11.0"]
        exclude:
          # torch 2.10+ requires Python >=3.10
          - python-version: "3.9"
            torch-version: "2.10.0"
          - python-version: "3.9"
            torch-version: "2.11.0"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies and override PyTorch ${{ matrix.torch-version }}
        run: |
          uv sync --group dev
          uv pip install torch==${{ matrix.torch-version }}

      - name: Verify PyTorch version
        run: uv run python -c "import torch; v = torch.__version__.split('+')[0]; assert v == '${{ matrix.torch-version }}', f'Expected ${{ matrix.torch-version }}, got {torch.__version__}'"

      - name: Run tests
        run: uv run pytest --no-cov -x -q
